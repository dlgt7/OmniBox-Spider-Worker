name = "omnibox-spider-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
SPIDER_REPO_URL = "https://gh-proxy.org/https://raw.githubusercontent.com/dlgt7/OmniBox-Spider"

[site]
bucket = "./public"

# KV 命名空间配置
# 运行 `wrangler kv:namespace create CACHE` 创建后填入 ID
[[kv_namespaces]]
binding = "CACHE"
id = "5dd70306319c499699475d52bc1cee65"
